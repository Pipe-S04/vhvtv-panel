services:
  postgres:
    image: postgres:16-alpine
    container_name: vhv-monitor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vhv_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-vhv_monitor}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: vhv-monitor-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${POSTGRES_DB:-vhv_monitor}
      DATABASE_USER: ${POSTGRES_USER:-vhv_monitor}
      DATABASE_PASSWORD_FILE: /run/secrets/postgres_password
      MASTER_KEY_FILE: /run/secrets/master_key
    secrets:
      - master_key
      - postgres_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
      - web
    healthcheck:
      test: ["CMD", "node", "dist/healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: vhv-monitor-worker
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      WORKER_CONCURRENCY: "1"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${POSTGRES_DB:-vhv_monitor}
      DATABASE_USER: ${POSTGRES_USER:-vhv_monitor}
      DATABASE_PASSWORD_FILE: /run/secrets/postgres_password
      MASTER_KEY_FILE: /run/secrets/master_key
    secrets:
      - master_key
      - postgres_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "node", "dist/healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: vhv-monitor-web
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    depends_on:
      api:
        condition: service_started
    networks:
      - web
    ports:
      - "${WEB_BIND:-127.0.0.1:3000}:3000"
    healthcheck:
      test: ["CMD", "node", "server-healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  backend:
    internal: true
  web:

volumes:
  postgres_data:

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  master_key:
    file: ./secrets/master_key.txt
